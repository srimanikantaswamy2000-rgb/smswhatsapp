# Daily lead-qualification report + hot-lead follow-ups.
#
# Calls the secret-protected cron endpoint once a day at 12:30 UTC
# (6:00 PM IST — end of the showroom day, so the report covers the
# whole day's enquiries). Also runnable by hand from the Actions tab.
#
# Required repo secret: AUTOMATION_CRON_SECRET — must match the
# AUTOMATION_CRON_SECRET env var on the Vercel deployment.
name: daily-lead-report

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lead report
        run: |
          curl --fail-with-body -sS \
            -H "x-cron-secret: ${{ secrets.AUTOMATION_CRON_SECRET }}" \
            "https://whatsapp-crm-test.vercel.app/api/cron/lead-report"
